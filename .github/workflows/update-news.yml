name: Daily AI News Update

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC = 3:00 AM ET
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Generate AI news via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-news.js

      - name: Commit updated news.json
        run: |
          git config user.name "Claude News Bot"
          git config user.email "bot@tariqiqbal.dev"
          git add public/news.json
          git diff --staged --quiet || git commit -m "chore: update AI news [$(date +%Y-%m-%d)]"
          git push

      - name: Build and deploy to Firebase
        run: npm ci && npm run build && npx firebase-tools deploy --only hosting --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
